<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>愤怒的小鸟</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      min-height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      border: 1px solid #333;
      cursor: crosshair;
    }
    #arxiv-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    #arxiv-bar input {
      background: #111;
      border: 1px solid #444;
      color: #ccc;
      padding: 6px 12px;
      font-size: 14px;
      border-radius: 4px;
      width: 280px;
      font-family: monospace;
    }
    #arxiv-bar input::placeholder { color: #555; }
    #arxiv-bar input:focus { outline: none; border-color: #888; }
    #arxiv-bar button {
      background: #222;
      border: 1px solid #444;
      color: #ccc;
      padding: 6px 14px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
    }
    #arxiv-bar button:hover { background: #333; }
    #arxiv-bar #arxiv-status {
      color: #666;
      font-size: 12px;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="arxiv-bar">
    <input id="arxiv-input" type="text" placeholder="arXiv ID (e.g. 1706.03762)" />
    <button id="arxiv-btn">Load Paper</button>
    <span id="arxiv-status">Default: Attention Is All You Need</span>
  </div>
  <canvas id="game"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
